<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW设计稿 Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 在途调整/编制申请表格组件
        const PendingApplicationsTable = () => {
            const pendingData = [
                {
                    id: '1', type: '2025年预算调整', dept: '远景工作室',
                    hc_pre_reg: 50, hc_pre_other: 9, hc_post_reg: 54, hc_post_other: 10, hc_diff_reg: 4, hc_diff_other: 1,
                    month_pre: 200.0, month_post: 209.5, month_diff: 9.5,
                    year_pre: 2400.0, year_post: 2508.6, year_diff: 108.6,
                    actions: ['submit', 'delete']
                },
                {
                    id: '2', type: '2025年预算调整', dept: '支撑部',
                    hc_pre_reg: 17, hc_pre_other: 2, hc_post_reg: 19, hc_post_other: 3, hc_diff_reg: 2, hc_diff_other: 1,
                    month_pre: 61.8, month_post: 66.1, month_diff: 4.3,
                    year_pre: 741.8, year_post: 793.4, year_diff: 51.6,
                    actions: []
                },
                {
                    id: '3', type: '2025年预算调整', dept: '增长部',
                    hc_pre_reg: 20, hc_pre_other: 2, hc_post_reg: 22, hc_post_other: 2, hc_diff_reg: 2, hc_diff_other: 0,
                    month_pre: 64.2, month_post: 69.4, month_diff: 5.2,
                    year_pre: 770.4, year_post: 827.4, year_diff: 57.0,
                    actions: []
                },
                {
                    id: '4', type: '2026年预算编制', dept: 'XX工作室',
                    hc_pre_reg: 108, hc_pre_other: 56, hc_post_reg: 83, hc_post_other: 70, hc_diff_reg: -25, hc_diff_other: 14,
                    month_pre: 216.6, month_post: 166.5, month_diff: -50.1,
                    year_pre: 2599.3, year_post: 2313.1, year_diff: -286.3,
                    actions: ['edit', 'delete', 'approving']
                },
                {
                    id: '5', type: '2026年预算编制', dept: '部门2',
                    hc_pre_reg: 35, hc_pre_other: 26, hc_post_reg: 26, hc_post_other: 30, hc_diff_reg: -9, hc_diff_other: 4,
                    month_pre: 67.1, month_post: 49.9, month_diff: -17.3,
                    year_pre: 805.5, year_post: 753.7, year_diff: -51.8,
                    actions: []
                },
                {
                    id: '6', type: '2026年预算编制', dept: '部门3',
                    hc_pre_reg: 15, hc_pre_other: 15, hc_post_reg: 13, hc_post_other: 20, hc_diff_reg: -2, hc_diff_other: 5,
                    month_pre: 29.7, month_post: 25.7, month_diff: -4.0,
                    year_pre: 356.3, year_post: 336.5, year_diff: -19.8,
                    actions: []
                },
                {
                    id: '7', type: '2026年预算编制', dept: '部门4',
                    hc_pre_reg: 41, hc_pre_other: 15, hc_post_reg: 31, hc_post_other: 20, hc_diff_reg: -10, hc_diff_other: 5,
                    month_pre: 84.5, month_post: 63.9, month_diff: -20.6,
                    year_pre: 1014.1, year_post: 849.2, year_diff: -164.9,
                    actions: []
                }
            ];

            const getTextColor = (val) => {
                if (val > 0) return 'text-red-500';
                if (val < 0) return 'text-green-500';
                return '';
            };

            return (
                <div className="bg-white rounded-lg shadow-sm border border-gray-200">
                    <div className="p-4 border-b border-gray-200">
                        <div className="flex items-center justify-between">
                            <h3 className="text-lg font-semibold text-gray-900">在途调整/编制申请 <span className="text-sm font-normal text-gray-500">(2)</span></h3>
                            <button className="text-gray-400 hover:text-gray-600">
                                <i className="fas fa-download"></i>
                            </button>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-semibold text-gray-900 border-b border-gray-200">申请类型</th>
                                    <th className="px-4 py-3 text-left text-sm font-semibold text-gray-900 border-b border-gray-200">申请部门</th>
                                    <th className="px-4 py-3 text-right text-sm font-semibold text-gray-900 border-b border-gray-200">HC申请前</th>
                                    <th className="px-4 py-3 text-right text-sm font-semibold text-gray-900 border-b border-gray-200">HC申请通过后</th>
                                    <th className="px-4 py-3 text-right text-sm font-semibold text-gray-900 border-b border-gray-200">变化</th>
                                    <th className="px-4 py-3 text-right text-sm font-semibold text-gray-900 border-b border-gray-200">月度工薪预算 (万)</th>
                                    <th className="px-4 py-3 text-right text-sm font-semibold text-gray-900 border-b border-gray-200">年度工薪预算 (万)</th>
                                    <th className="px-4 py-3 text-center text-sm font-semibold text-gray-900 border-b border-gray-200">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {pendingData.map((item, index) => (
                                    <tr key={item.id} className="hover:bg-gray-50">
                                        <td className="px-4 py-3 text-sm text-gray-900 border-b border-gray-200">{item.type}</td>
                                        <td className="px-4 py-3 text-sm text-gray-900 border-b border-gray-200">{item.dept}</td>
                                        <td className="px-4 py-3 text-sm text-gray-900 border-b border-gray-200 text-right">{item.hc_pre_reg} / {item.hc_pre_other}</td>
                                        <td className="px-4 py-3 text-sm text-blue-600 border-b border-gray-200 text-right">{item.hc_post_reg} / {item.hc_post_other}</td>
                                        <td className="px-4 py-3 text-sm border-b border-gray-200 text-right">
                                            <span className={getTextColor(item.hc_diff_reg)}>{item.hc_diff_reg > 0 ? '+' : ''}{item.hc_diff_reg}</span>
                                            <span className="mx-2">/</span>
                                            <span className={getTextColor(item.hc_diff_other)}>{item.hc_diff_other > 0 ? '+' : ''}{item.hc_diff_other}</span>
                                        </td>
                                        <td className="px-4 py-3 text-sm border-b border-gray-200 text-right">
                                            <span className={getTextColor(item.month_diff)}>{item.month_diff > 0 ? '+' : ''}{item.month_diff}</span>
                                        </td>
                                        <td className="px-4 py-3 text-sm border-b border-gray-200 text-right">
                                            <span className={getTextColor(item.year_diff)}>{item.year_diff > 0 ? '+' : ''}{item.year_diff}</span>
                                        </td>
                                        <td className="px-4 py-3 text-sm text-center border-b border-gray-200">
                                            <div className="flex flex-col gap-1">
                                                {item.actions.includes('submit') && <button className="text-blue-600 hover:text-blue-800 text-xs">去提交</button>}
                                                {item.actions.includes('edit') && <button className="text-blue-600 hover:text-blue-800 text-xs">修改</button>}
                                                {item.actions.includes('delete') && <button className="text-red-600 hover:text-red-800 text-xs">删除</button>}
                                                {item.actions.includes('approving') && <span className="text-orange-500 text-xs">审批中</span>}
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 当前工薪执行现状及现行规划表格组件
        const BudgetPlanningTable = () => {
            const departments = [
                {
                    id: '1',
                    name: '研发部',
                    h26_cur: [120, 15, 8, 25, 10],
                    h26_tgt: [125, 16, 9, 26, 11],
                    cost_acc: 850.5,
                    cost_year: 1200.0,
                    children: [
                        {
                            id: '1-1',
                            name: '前端组',
                            h26_cur: [45, 5, 3, 10, 4],
                            h26_tgt: [48, 6, 4, 11, 5],
                            cost_acc: 320.0,
                            cost_year: 450.0
                        },
                        {
                            id: '1-2',
                            name: '后端组',
                            h26_cur: [50, 6, 3, 8, 3],
                            h26_tgt: [52, 7, 3, 9, 4],
                            cost_acc: 380.0,
                            cost_year: 520.0
                        },
                        {
                            id: '1-3',
                            name: '测试组',
                            h26_cur: [25, 4, 2, 7, 3],
                            h26_tgt: [25, 3, 2, 6, 2],
                            cost_acc: 150.5,
                            cost_year: 230.0
                        }
                    ]
                },
                {
                    id: '2',
                    name: '产品部',
                    h26_cur: [30, 5, 2, 8, 3],
                    h26_tgt: [32, 6, 3, 9, 4],
                    cost_acc: 210.0,
                    cost_year: 300.0
                },
                {
                    id: '3',
                    name: '运营部',
                    h26_cur: [40, 8, 4, 12, 5],
                    h26_tgt: [42, 9, 5, 13, 6],
                    cost_acc: 280.0,
                    cost_year: 400.0
                }
            ];

            const formatCount = (val) => val.toLocaleString();
            const formatMoney = (val) => val.toLocaleString('zh-CN', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

            const renderDepartmentRow = (dept, level = 0) => {
                const indent = level * 20;

                return (
                    <tr className={level > 0 ? 'bg-gray-50' : ''}>
                        <td className="px-4 py-2 text-sm text-gray-900 border-b border-gray-200" style={{ paddingLeft: `${indent}px` }}>
                            {dept.name}
                        </td>
                        <td className="px-2 py-2 text-sm text-gray-600 border-b border-gray-200 text-right">
                            {dept.h26_cur.map((val, idx) => (
                                <div key={idx}>{formatCount(val)}</div>
                            ))}
                        </td>
                        <td className="px-2 py-2 text-sm text-blue-600 border-b border-gray-200 text-right">
                            {dept.h26_tgt.map((val, idx) => (
                                <div key={idx} className="font-semibold">{formatCount(val)}</div>
                            ))}
                        </td>
                        <td className="px-2 py-2 text-sm text-gray-600 border-b border-gray-200 text-right">
                            {formatMoney(dept.cost_acc)}
                        </td>
                        <td className="px-2 py-2 text-sm text-blue-600 border-b border-gray-200 text-right font-semibold">
                            {formatMoney(dept.cost_year)}
                        </td>
                    </tr>
                );
            };

            return (
                <div className="bg-white rounded-lg shadow-sm border border-gray-200">
                    <div className="p-4 border-b border-gray-200">
                        <div className="flex items-center justify-between">
                            <h3 className="text-lg font-semibold text-gray-900">当前工薪执行现状及现行规划</h3>
                            <div className="flex gap-2">
                                <button className="px-3 py-1 text-sm text-gray-600 hover:text-gray-800">一键折叠</button>
                                <button className="px-3 py-1 text-sm text-gray-600 hover:text-gray-800">一键展开</button>
                            </div>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-semibold text-gray-900 border-b border-gray-200">部门</th>
                                    <th className="px-2 py-3 text-center text-sm font-semibold text-gray-900 border-b border-gray-200">HC当前</th>
                                    <th className="px-2 py-3 text-center text-sm font-semibold text-gray-900 border-b border-gray-200">HC年末目标</th>
                                    <th className="px-2 py-3 text-center text-sm font-semibold text-gray-900 border-b border-gray-200">工薪成本 (万)</th>
                                </tr>
                                <tr>
                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500 border-b border-gray-200"></th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">正编</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">实习</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">派遣</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">外包</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">兼职</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200"></th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">正编</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">实习</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">派遣</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">外包</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">兼职</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200"></th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">累计已发生</th>
                                    <th className="px-2 py-2 text-center text-xs font-medium text-gray-500 border-b border-gray-200">全年预算</th>
                                </tr>
                            </thead>
                            <tbody>
                                {departments.map((dept) => (
                                    <React.Fragment key={dept.id}>
                                        {renderDepartmentRow(dept)}
                                        {dept.children && dept.children.map((child) => renderDepartmentRow(child, 1))}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 主应用组件
        const App = () => {
            return (
                <div className="min-h-screen bg-gray-100 p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-8">
                            <h1 className="text-2xl font-bold text-gray-900 mb-2">工薪预算驾驶舱</h1>
                            <p className="text-gray-600">管理和监控公司工薪预算的执行情况</p>
                        </div>

                        <div className="space-y-6">
                            <PendingApplicationsTable />
                            <BudgetPlanningTable />
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
